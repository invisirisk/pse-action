name: 'InvisiRisk PSE Security Proxy'
description: 'Sets up PSE Security Proxy for secure package downloads'
author: 'InvisiRisk'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api_url:
    description: 'URL of the InvisiRisk API'
    required: true
  app_token:
    description: 'Authentication token for the InvisiRisk API'
    required: true
  portal_url:
    description: 'URL of the InvisiRisk Portal (defaults to api_url if not provided)'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for GitHub API access'
    required: false
    default: ${{ github.token }}
  debug:
    description: 'Enable debug mode for verbose logging'
    required: false
    default: 'false'
  test_mode:
    description: 'Enable test mode to bypass API calls'
    required: false
    default: 'false'
  send_job_status:
    description: 'Allow SaaS platform to fetch job status during cleanup'
    required: false
    default: 'true'
  mode:
    description: 'Operation mode: "all" (default) performs prepare, download, setup, intercept'
    required: false
    default: 'all'
  scan_id:
    description: 'Scan ID from a previous prepare step'
    required: false
    default: ''
  collect_dependencies:
    description: 'Collect dependency graphs during cleanup (default true)'
    required: false
    default: ''
  workdir:
    description: 'Project path for dependency graph collection'
    required: false
    default: ''
  arch:
    description: 'Binary architecture (amd64, arm64). Auto-detected if empty.'
    required: false
    default: ''

outputs:
  scan_id:
    description: 'The scan ID generated or used by the action'
  proxy_ip:
    description: 'IP address of the PSE proxy'

runs:
  using: 'node20'
  main: 'main.js'
  post: 'post.js'
  post-if: always()
